name: Feature or behavior change
description: Propose a feature, behavior change, documentation change, or direction check.
body:
  - type: markdown
    attributes:
      value: |
        **Before you start:** Read [CONTRIBUTING.md](https://github.com/ogulcancelik/herdr/blob/master/CONTRIBUTING.md).

        New PRs from unapproved contributors are auto-closed by default. Open an issue first and wait for maintainer approval. Issues that do not meet the quality bar in [CONTRIBUTING.md](https://github.com/ogulcancelik/herdr/blob/master/CONTRIBUTING.md) may be closed or left without a reply.

        Keep this short. If it does not fit on one screen, it is too long. Write in your own voice.

  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What does herdr do today?
    validations:
      required: true

  - type: textarea
    id: requested-change
    attributes:
      label: Requested change
      description: What do you want to change?
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why does this belong in herdr?
    validations:
      required: true

  - type: dropdown
    id: product-impact
    attributes:
      label: Does this change UI, interaction, workflow, or product direction?
      options:
        - "No"
        - "Yes"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: product-impact-details
    attributes:
      label: Impact details
      description: If yes or not sure, explain what changes for users.

  - type: checkboxes
    id: contribution-intent
    attributes:
      label: Contribution intent
      options:
        - label: I intend to open a PR for this issue.
          required: false
        - label: I understand this does not mean the issue is approved.
          required: false
